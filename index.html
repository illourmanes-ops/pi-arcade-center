<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Arcade Center</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a1a;color:#fff;font-family:Arial;min-height:100vh;padding:8px}
        button{padding:12px;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-size:14px;width:100%;margin:3px 0}
        button:active{transform:scale(.96)}
        .header{text-align:center;padding:10px}
        .header h1{color:#ffd700;font-size:24px}
        .score-bar{display:flex;justify-content:space-around;background:rgba(255,255,255,.05);padding:10px;border-radius:10px;margin:8px auto;max-width:400px;font-size:12px}
        .score-bar span{color:#ffd700;font-weight:700}
        .category-title{color:#ffd700;font-size:16px;margin:15px 0 8px;text-align:center}
        .game-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;max-width:400px;margin:10px auto}
        .game-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:12px 8px;text-align:center;cursor:pointer;transition:.2s}
        .game-card:hover{border-color:#ffd700;transform:translateY(-2px)}
        .game-card .icon{font-size:30px;margin-bottom:4px}
        .game-card .name{font-weight:700;font-size:11px;color:#ffd700}
        .modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.97);z-index:100;padding:8px;overflow-y:auto}
        .modal.show{display:flex;flex-direction:column;align-items:center;justify-content:center}
        .modal-box{background:#111;border:2px solid #ffd700;border-radius:16px;padding:12px;max-width:380px;width:100%;text-align:center}
        .modal-box h2{color:#ffd700;margin-bottom:6px;font-size:18px}
        .close-btn{background:#ff5d4d;color:#fff;margin-top:6px}
        .play-btn{background:#8c3ce0;color:#fff}
        .win-btn{background:#3ddc84;color:#000}
        .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#ffd700;color:#000;padding:10px 20px;border-radius:20px;font-weight:700;z-index:999;display:none;font-size:13px}
        .toast.show{display:block}
        canvas{display:block;margin:8px auto;border:2px solid #ffd700;border-radius:8px;background:#000;max-width:100%}
        .game-controls{display:flex;gap:3px;justify-content:center;margin-top:6px;flex-wrap:wrap}
        .game-controls button{width:50px;height:50px;font-size:20px;border-radius:50%}
    </style>
</head>
<body>

<div class="header">
    <h1>🕹️ Pi Arcade Center</h1>
    <p style="color:#aaa;font-size:11px">20+ Jeux Gratuits</p>
</div>

<div class="score-bar">
    <span>⭐ <span id="ptsDisplay">0</span> pts</span>
    <span>🏆 Niv.<span id="lvlDisplay">1</span></span>
</div>

<div class="category-title">🕹️ ARCADE</div>
<div class="game-grid">
    <div class="game-card" onclick="openGame('runner')"><div class="icon">🏃</div><div class="name">Runner</div></div>
    <div class="game-card" onclick="openGame('snake')"><div class="icon">🐍</div><div class="name">Snake</div></div>
    <div class="game-card" onclick="openGame('flappy')"><div class="icon">🐦</div><div class="name">Flappy</div></div>
    <div class="game-card" onclick="openGame('slots')"><div class="icon">🎰</div><div class="name">Slots</div></div>
    <div class="game-card" onclick="openGame('mines')"><div class="icon">💣</div><div class="name">Mines</div></div>
    <div class="game-card" onclick="openGame('dice')"><div class="icon">🎲</div><div class="name">Dés</div></div>
</div>

<!-- MODALS -->
<div class="modal" id="modalRunner"><div class="modal-box"><h2>🏃 Runner</h2><canvas id="canvasRunner" width="350" height="200"></canvas><p>Score: <strong id="runnerScore">0</strong></p><button class="play-btn" onclick="runnerJump()">⬆️ SAUTER</button><button class="close-btn" onclick="closeGame('runner')">Quitter</button></div></div>
<div class="modal" id="modalSnake"><div class="modal-box"><h2>🐍 Snake</h2><canvas id="canvasSnake" width="300" height="300"></canvas><p>Score: <strong id="snakeScore">0</strong></p><div class="game-controls" style="display:grid;grid-template-columns:1fr 1fr 1fr;max-width:180px;margin:0 auto"><div></div><button onclick="snakeDir('up')">⬆️</button><div></div><button onclick="snakeDir('left')">⬅️</button><button onclick="snakeDir('down')">⬇️</button><button onclick="snakeDir('right')">➡️</button></div><button class="close-btn" onclick="closeGame('snake')">Quitter</button></div></div>
<div class="modal" id="modalFlappy"><div class="modal-box"><h2>🐦 Flappy Pi</h2><canvas id="canvasFlappy" width="300" height="300"></canvas><p>Score: <strong id="flappyScore">0</strong></p><button class="play-btn" onclick="flappyFlap()">⬆️ VOLER</button><button class="close-btn" onclick="closeGame('flappy')">Quitter</button></div></div>
<div class="modal" id="modalSlots"><div class="modal-box"><h2>🎰 Slots</h2><div style="display:flex;gap:6px;justify-content:center;margin:10px 0"><div id="s1" style="width:70px;height:80px;background:#1a1a3a;border:2px solid #ffd700;border-radius:10px;font-size:40px;display:flex;align-items:center;justify-content:center">🍒</div><div id="s2" style="width:70px;height:80px;background:#1a1a3a;border:2px solid #ffd700;border-radius:10px;font-size:40px;display:flex;align-items:center;justify-content:center">🍋</div><div id="s3" style="width:70px;height:80px;background:#1a1a3a;border:2px solid #ffd700;border-radius:10px;font-size:40px;display:flex;align-items:center;justify-content:center">🍊</div></div><button class="play-btn" onclick="spinSlots()">🎰 SPIN</button><button class="close-btn" onclick="closeGame('slots')">Quitter</button></div></div>
<div class="modal" id="modalMines"><div class="modal-box"><h2>💣 Mines</h2><div id="minesGrid" style="display:grid;grid-template-columns:repeat(5,1fr);gap:3px;max-width:250px;margin:10px auto"></div><p>Gain: <strong id="minesGain">0</strong></p><button class="win-btn" onclick="cashOut()">💰 RÉCUPÉRER</button><button class="close-btn" onclick="closeGame('mines')">Quitter</button></div></div>
<div class="modal" id="modalDice"><div class="modal-box"><h2>🎲 Dés</h2><div style="font-size:60px;margin:15px" id="diceDisplay">🎲</div><button class="play-btn" onclick="rollDice()">🎲 LANCER</button><button class="close-btn" onclick="closeGame('dice')">Quitter</button></div></div>

<div class="toast" id="toast"></div>

<script>
// ============ JEUX DIRECTS ============
let pts = parseInt(localStorage.getItem('pac_pts')||'0');
let intervals = {};

function toast(m) {
    const t = document.getElementById('toast');
    t.textContent = m; t.className = 'toast show';
    setTimeout(() => t.className = 'toast', 2000);
}

function addPts(a) {
    pts += a;
    localStorage.setItem('pac_pts', pts);
    document.getElementById('ptsDisplay').textContent = pts;
    document.getElementById('lvlDisplay').textContent = Math.floor(pts/500)+1;
}

function openGame(g) {
    document.getElementById('modal'+g.charAt(0).toUpperCase()+g.slice(1)).classList.add('show');
    if (g==='runner') startRunner();
    if (g==='snake') startSnake();
    if (g==='flappy') startFlappy();
    if (g==='mines') startMines();
}

function closeGame(g) {
    document.getElementById('modal'+g.charAt(0).toUpperCase()+g.slice(1)).classList.remove('show');
    Object.keys(intervals).forEach(k => { clearInterval(intervals[k]); delete intervals[k]; });
}

// ============ RUNNER ============
let ry=150, rvy=0, rsc=0, rob=[];
function startRunner() {
    rsc=0; ry=150; rvy=0; rob=[{x:350,y:170,w:20,h:30}];
    document.getElementById('runnerScore').textContent='0';
    const c=document.getElementById('canvasRunner'), ctx=c.getContext('2d');
    clearInterval(intervals.runner);
    intervals.runner = setInterval(() => {
        rvy+=0.5; ry+=rvy;
        if(ry>150){ry=150;rvy=0;}
        rob.forEach(o=>o.x-=3);
        if(rob[rob.length-1].x<250) rob.push({x:380,y:170,w:20,h:25+Math.random()*25});
        rob=rob.filter(o=>o.x>-30);
        const p={x:50,y:ry,w:25,h:25};
        rob.forEach(o=>{if(p.x<o.x+o.w&&p.x+p.w>o.x&&p.y<o.y+o.h&&p.y+p.h>o.y){clearInterval(intervals.runner);addPts(rsc);toast('🏃 Game Over ! +'+rsc+' pts');}});
        rsc++;
        document.getElementById('runnerScore').textContent=rsc;
        ctx.fillStyle='#000';ctx.fillRect(0,0,350,200);
        ctx.fillStyle='#3ddc84';ctx.fillRect(50,ry,25,25);
        ctx.fillStyle='#ff5d4d';rob.forEach(o=>ctx.fillRect(o.x,o.y,o.w,o.h));
        ctx.fillStyle='#333';ctx.fillRect(0,175,350,25);
    },20);
}
function runnerJump(){if(ry>=150)rvy=-8;}

// ============ SNAKE ============
let sn=[],sd='right',sf={},ssc=0;
function startSnake() {
    sn=[{x:5,y:5},{x:4,y:5},{x:3,y:5}];sd='right';ssc=0;
    spawnSF();
    document.getElementById('snakeScore').textContent='0';
    const c=document.getElementById('canvasSnake'),ctx=c.getContext('2d');
    clearInterval(intervals.snake);
    intervals.snake=setInterval(()=>{
        const h={...sn[0]};
        if(sd==='up')h.y--;if(sd==='down')h.y++;if(sd==='left')h.x--;if(sd==='right')h.x++;
        if(h.x<0||h.x>=20||h.y<0||h.y>=20||sn.some(s=>s.x===h.x&&s.y===h.y)){clearInterval(intervals.snake);addPts(ssc);toast('🐍 Game Over ! +'+ssc+' pts');return;}
        sn.unshift(h);
        if(h.x===sf.x&&h.y===sf.y){ssc+=10;spawnSF();}else{sn.pop();}
        document.getElementById('snakeScore').textContent=ssc;
        ctx.fillStyle='#000';ctx.fillRect(0,0,300,300);
        ctx.fillStyle='#3ddc84';sn.forEach(s=>ctx.fillRect(s.x*15,s.y*15,14,14));
        ctx.fillStyle='#ff5d4d';ctx.fillRect(sf.x*15,sf.y*15,14,14);
    },100);
}
function spawnSF(){sf={x:Math.floor(Math.random()*20),y:Math.floor(Math.random()*20)};while(sn.some(s=>s.x===sf.x&&s.y===sf.y))spawnSF();}
function snakeDir(d){sd=d;}

// ============ FLAPPY ============
let fby=150,fbvy=0,fpipes=[],fsc=0;
function startFlappy() {
    fsc=0;fby=150;fbvy=0;fpipes=[{x:300,gapY:150}];
    document.getElementById('flappyScore').textContent='0';
    const c=document.getElementById('canvasFlappy'),ctx=c.getContext('2d');
    clearInterval(intervals.flappy);
    intervals.flappy=setInterval(()=>{
        fbvy+=0.3;fby+=fbvy;
        fpipes.forEach(p=>p.x-=2);
        if(fpipes[fpipes.length-1].x<200)fpipes.push({x:320,gapY:80+Math.random()*120});
        fpipes=fpipes.filter(p=>p.x>-50);
        fpipes.forEach(p=>{if(p.x===48)fsc++;});
        const bird={x:50,y:fby,w:20,h:20};
        fpipes.forEach(p=>{if(bird.x<p.x+30&&bird.x+bird.w>p.x&&(bird.y<p.gapY-40||bird.y+bird.h>p.gapY+40)){clearInterval(intervals.flappy);addPts(fsc);toast('🐦 +'+fsc+' pts');}});
        if(fby<0||fby>280){clearInterval(intervals.flappy);addPts(fsc);toast('🐦 +'+fsc+' pts');}
        document.getElementById('flappyScore').textContent=fsc;
        ctx.fillStyle='#4a9eff';ctx.fillRect(0,0,300,300);
        ctx.fillStyle='#ffd700';ctx.fillRect(50,fby,20,20);
        ctx.fillStyle='#3ddc84';fpipes.forEach(p=>{ctx.fillRect(p.x,0,30,p.gapY-40);ctx.fillRect(p.x,p.gapY+40,30,300-p.gapY-40);});
    },16);
}
function flappyFlap(){fbvy=-5;}

// ============ MINES ============
let minesData=[],minesGain=0,minesActive=false;
function startMines() {
    minesData=Array(25).fill(null).map(()=>({bomb:false,revealed:false}));
    let b=0;while(b<3){const p=Math.floor(Math.random()*25);if(!minesData[p].bomb){minesData[p].bomb=true;b++;}}
    minesGain=0;minesActive=true;
    document.getElementById('minesGain').textContent='0';
    renderMines();
}
function renderMines() {
    let h='';
    minesData.forEach((c,i)=>{h+='<div onclick="revealMine('+i+')" style="aspect-ratio:1;background:'+(c.revealed?(c.bomb?'#3a1a1a':'#1a3a1a'):'#1a1a3a')+';display:flex;align-items:center;justify-content:center;font-size:20px;border-radius:6px;cursor:pointer">'+(c.revealed?(c.bomb?'💣':'💎'):'?')+'</div>';});
    document.getElementById('minesGrid').innerHTML=h;
}
function revealMine(i) {
    if(!minesActive||minesData[i].revealed)return;
    minesData[i].revealed=true;
    if(minesData[i].bomb){minesActive=false;toast('💣 Perdu !');}else{minesGain+=25;document.getElementById('minesGain').textContent=minesGain;}
    renderMines();
}
function cashOut(){if(minesActive&&minesGain>0){addPts(minesGain);toast('💰 +'+minesGain+' pts');minesActive=false;closeGame('mines');}}

// ============ SLOTS ============
function spinSlots() {
    const sym=['🍒','🍋','🍊','🍇','💎','7️⃣','⭐'];
    const s1=sym[Math.floor(Math.random()*7)],s2=sym[Math.floor(Math.random()*7)],s3=sym[Math.floor(Math.random()*7)];
    document.getElementById('s1').textContent=s1;
    document.getElementById('s2').textContent=s2;
    document.getElementById('s3').textContent=s3;
    if(s1===s2&&s2===s3){addPts(100);toast('🎰 JACKPOT +100 pts !');}
    else if(s1===s2||s2===s3||s1===s3){addPts(10);toast('🎉 Presque ! +10 pts');}
}

// ============ DICE ============
function rollDice() {
    const r=Math.floor(Math.random()*6)+1;
    document.getElementById('diceDisplay').textContent=['','⚀','⚁','⚂','⚃','⚄','⚅'][r];
    addPts(r*5);
    toast('🎲 '+r+' ! +'+(r*5)+' pts');
}

// ============ INIT ============
document.getElementById('ptsDisplay').textContent=pts;
document.getElementById('lvlDisplay').textContent=Math.floor(pts/500)+1;
console.log('✅ Pi Arcade Center - PRÊT !');
</script>
</body>
</html>
